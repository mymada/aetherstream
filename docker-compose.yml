version: "3.8"

services:
  aetherstream:
    build:
      context: .
      dockerfile: Dockerfile
    image: aetherstream:latest
    container_name: aetherstream
    restart: unless-stopped
    ports:
      - "8080:8080"      # API + Web UI
      - "8097:8097/udp"  # DLNA/UPnP
      - "8097:8097/tcp"  # DLNA/UPnP
    volumes:
      - aetherstream_data:/data
      - ./media:/media:ro
    environment:
      - DATA_DIR=/data
      - MEDIA_DIR=/media
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
      - DLNA_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/system/info"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - aetherstream

volumes:
  aetherstream_data:
    driver: local

networks:
  aetherstream:
    driver: bridge
